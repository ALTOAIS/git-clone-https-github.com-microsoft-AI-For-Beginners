# ------------------------------------------------------------------
# English Flow — Personal AI English Coach
# Отдельный Render Blueprint. НИКАК не связан с Compliance Risk Hub:
# другие сервисы, другие имена. Корневой render.yaml (CRH) не затрагивается.
#
# База данных НЕ создаётся в Render (бесплатный слот Postgres уже занят).
# Используется внешняя PostgreSQL через DATABASE_URL — Render запросит
# значение при применении blueprint (sync: false). Подойдёт любой managed
# Postgres: Neon, Supabase, Railway и т.п. Строка подключения обычно
# требует SSL, например:
#   postgresql://USER:PASSWORD@HOST/DBNAME?sslmode=require
# Prisma поддерживает sslmode прямо в URL — доработки кода не нужны.
#
# Примечание по Render: rootDir указывается ОТНОСИТЕЛЬНО КОРНЯ репозитория,
# независимо от того, где лежит сам render.yaml.
# ------------------------------------------------------------------

services:
  # -------------------- Backend (NestJS + Prisma) --------------------
  - type: web
    name: english-flow-api
    runtime: docker
    rootDir: english-flow/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    # preDeployCommand НЕ используется: эта функция Render доступна только на
    # платных планах (paid web services), а этот сервис — на free. На free
    # Render молча игнорирует preDeployCommand и идёт build → CMD напрямую,
    # так что миграции/сиды выполняются в CMD Dockerfile (см. Dockerfile).
    # Если когда-нибудь перейдёте на платный план — можно вернуть
    # preDeployCommand: npx prisma migrate deploy && (node dist-seed/prisma/seed.js || true)
    # и убрать эту логику из CMD, чтобы деплои не гонялись за advisory lock.
    envVars:
      # Внешняя PostgreSQL. sync: false — Render запросит значение
      # при создании сервиса; в репозитории строка подключения не хранится.
      # Для Neon сюда идёт POOLED-строка (host вида "...-pooler...") —
      # её же приложение использует во время работы.
      - key: DATABASE_URL
        sync: false
      # Прямое (НЕ через PgBouncer/pooler) подключение — используется
      # ТОЛЬКО на шаге `prisma migrate deploy` при старте контейнера.
      # Для Neon: в Connection Details выключите тумблер "Pooled connection"
      # (или вручную уберите "-pooler" из хоста в DATABASE_URL) и скопируйте
      # получившуюся строку сюда. Без этой переменной миграции падают с
      # P1002 (таймаут advisory lock) — postgres advisory lock не работает
      # через pooled-соединение.
      - key: DIRECT_URL
        sync: false
      # JWT-секрет генерируется Render'ом и нигде не хранится в репозитории.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 30d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # ВАЖНО: sync: false, а НЕ фиксированное value. Любой push, меняющий этот
      # файл, триггерит Blueprint-синк на Render; для ключей с value: X Render
      # переприменяет это значение при каждом синке, затирая то, что вручную
      # выставлено в дашборде. AI_PROVIDER раньше был захардкожен в "mock" —
      # именно это откатывало реального Anthropic-провайдера в дев-фолбэк
      # при каждом деплое, менявшем render.yaml (см. историю коммитов).
      # AI_API_KEY/AI_MODEL сюда намеренно не добавлены — они задаются
      # только вручную в дашборде и синком не затрагиваются, пока не описаны
      # в этом файле.
      - key: AI_PROVIDER
        sync: false
      # После деплоя фронтенда замените "*" на его точный URL
      # (https://english-flow.onrender.com), чтобы ограничить CORS.
      - key: CORS_ORIGIN
        value: "*"

  # -------------------- Frontend (React + Vite + PWA) --------------------
  - type: web
    name: english-flow
    runtime: static
    rootDir: english-flow/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Vite подставляет это значение на этапе сборки. После первого деплоя
      # бэкенда замените на его точный URL + /api и сделайте Manual Deploy.
      - key: VITE_API_URL
        value: https://english-flow-api.onrender.com/api
    # SPA-rewrite для React Router: все пути отдают index.html.
    # Service worker и manifest (dist/sw.js, dist/manifest.webmanifest)
    # это правило не ломает — они отдаются как статические файлы напрямую.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
