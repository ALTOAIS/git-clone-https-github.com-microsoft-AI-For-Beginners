databases:
  - name: crh-postgres
    databaseName: compliance_risk_hub
    plan: free

  # English Flow — отдельная изолированная база (не связана с CRH).
  # ВНИМАНИЕ: Render допускает только одну бесплатную Postgres на воркспейс.
  # Если crh-postgres уже занимает бесплатный слот, поменяйте план на
  # basic-256mb (или другой платный) перед применением blueprint.
  - name: english-flow-db
    databaseName: english_flow
    plan: free

services:
  - type: web
    name: crh-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crh-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: "3000"
      - key: UPLOAD_DIR
        value: ./uploads
      # Set this to the frontend's exact URL once it's deployed (step 2 in docs/DEPLOYMENT.md).
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: crh-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the backend's exact URL + /api once it's deployed (step 1 in docs/DEPLOYMENT.md).
      - key: VITE_API_URL
        value: https://crh-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ------------------------------------------------------------------
  # English Flow — Personal AI English Coach (english-flow/)
  # ------------------------------------------------------------------
  - type: web
    name: english-flow-api
    runtime: docker
    rootDir: english-flow/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: english-flow-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 30d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      # Реальный ИИ-провайдер подключается позже через дашборд
      # (AI_PROVIDER, AI_API_KEY, AI_MODEL); без него работает дев-фолбэк.
      - key: AI_PROVIDER
        value: mock
      # После деплоя фронтенда замените на его точный URL.
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: english-flow
    runtime: static
    rootDir: english-flow/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # После деплоя бэкенда замените на его точный URL + /api.
      - key: VITE_API_URL
        value: https://english-flow-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
