databases:
  - name: crh-postgres
    databaseName: compliance_risk_hub
    plan: free

services:
  - type: web
    name: crh-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crh-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: "3000"
      - key: UPLOAD_DIR
        value: ./uploads
      # Set this to the frontend's exact URL once it's deployed (step 2 in docs/DEPLOYMENT.md).
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: crh-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the backend's exact URL + /api once it's deployed (step 1 in docs/DEPLOYMENT.md).
      - key: VITE_API_URL
        value: https://crh-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
