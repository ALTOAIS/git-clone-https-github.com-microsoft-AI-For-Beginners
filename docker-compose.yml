services:
  postgres:
    image: postgres:16-alpine
    container_name: crh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crh
      POSTGRES_PASSWORD: crh_password
      POSTGRES_DB: compliance_risk_hub
    ports:
      - "5432:5432"
    volumes:
      - crh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crh -d compliance_risk_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: crh-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crh:crh_password@postgres:5432/compliance_risk_hub?schema=public
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - crh_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: crh-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  crh_postgres_data:
  crh_uploads:
